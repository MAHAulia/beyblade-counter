<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bey Battle Judge</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animation.css">

</head>

<body>

    <div id="app">

        <main class="battle-ui">

            <!-- ================= LEFT ================= -->

            <section id="leftSide" class="side left">

                <header class="player-header">
                    <div class="player-name">
                        VIC
                    </div>
                </header>

                <div class="touch-panel">

                    <div class="avatar-box">

                        <div class="logo">
                            Z
                        </div>

                    </div>

                    <div class="ready-text">

                        TAP TO READY

                    </div>

                </div>

                <footer class="score-panel">

                    <button class="score-btn" data-point="1">
                        <span>SPIN</span>
                        <strong>+1</strong>
                    </button>

                    <button class="score-btn" data-point="2">
                        <span>OVER</span>
                        <strong>+2</strong>
                    </button>

                    <button class="score-btn" data-point="2">
                        <span>BURST</span>
                        <strong>+2</strong>
                    </button>

                    <button class="score-btn" data-point="3">
                        <span>XTREME</span>
                        <strong>+3</strong>
                    </button>

                </footer>

            </section>

            <!-- ================= CENTER ================= -->

            <section class="center">

                <div class="round-box">

                    <h1>R1</h1>

                </div>

                <div class="score-area">

                    <div class="score-card">

                        <span id="leftScore">0</span>

                    </div>

                    <div class="vs">

                        VS

                    </div>

                    <div class="score-card">

                        <span id="rightScore">0</span>

                    </div>

                </div>

                <div id="statusText" class="status-box">

                    STANDBY

                </div>

            </section>

            <!-- ================= RIGHT ================= -->

            <section id="rightSide" class="side right">

                <header class="player-header">

                    <div class="player-name">

                        YAT

                    </div>

                </header>

                <div class="touch-panel">

                    <div class="avatar-box">

                        <div class="logo">

                            Z

                        </div>

                    </div>

                    <div class="ready-text">

                        TAP TO READY

                    </div>

                </div>

                <footer class="score-panel">

                    <button class="score-btn" data-point="1">
                        <strong>+1</strong>
                        <span>SPIN</span>
                    </button>

                    <button class="score-btn" data-point="2">
                        <strong>+2</strong>
                        <span>OVER</span>
                    </button>

                    <button class="score-btn" data-point="2">
                        <strong>+2</strong>
                        <span>BURST</span>
                    </button>

                    <button class="score-btn" data-point="3">
                        <strong>+3</strong>
                        <span>XTREME</span>
                    </button>

                </footer>

            </section>

        </main>

    </div>

    <script type="module" src="js/app.js"></script>

</body>

</html>
